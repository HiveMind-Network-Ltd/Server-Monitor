name: Docker Build and Push

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-to-ghcr:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trigger deploy on grid server
        run: |
          set -eo pipefail
          # Expects the new POST /deploy/:service webhook (see services/deployService.js)
          # to respond 202 with a JSON body; fail the CI step on any non-2xx.
          echo "Calling deploy webhook..."
          resp=$(curl -sS -w "\nHTTP_STATUS=%{http_code}" \
            -X POST https://server-monitor.grid.hivemindnetwork.com/deploy/server-monitor \
            -H "X-Hive-Secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET_SERVER_MONITOR }}")
          echo "$resp"
          status=$(echo "$resp" | sed -n 's/^HTTP_STATUS=//p')
          if [ "${status:-0}" -lt 200 ] || [ "${status:-0}" -ge 300 ]; then
            echo "::error::deploy webhook returned HTTP $status"
            exit 1
          fi
          echo "Deploy webhook accepted (status=$status); sidecar is redeploying server-monitor."
