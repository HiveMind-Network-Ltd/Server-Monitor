version: '3.8'

services:
  server-monitor:
    image: ghcr.io/hivemindnet/server-monitor:latest
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Persist JSON data files AND the SQLite metrics database
      - server-monitor-data:/app/data
      # Docker socket for container monitoring (optional)
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
      # Override in .env or via docker run -e
      # - ADMIN_USERNAME=admin
      # - ADMIN_PASSWORD=change-me
      # - JWT_SECRET=change-me
      # - SESSION_SECRET=change-me
      # - MONITOR_INTERVAL=30000
      # - METRICS_RETENTION_DAYS=30
      # - SMTP_HOST=smtp.gmail.com
      # - SMTP_PORT=587
      # - SMTP_USER=your-email@gmail.com
      # - SMTP_PASS=your-app-password
      # - ALERT_EMAIL_TO=admin@example.com
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  server-monitor-data:
    driver: local
